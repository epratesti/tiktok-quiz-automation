name: TikTok Quiz Automation

on:
  schedule:
    # 00, 06, 12 e 18 UTC = 21, 03, 09 e 15 no horario de Brasilia.
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
      VIDEOS_PER_RUN: "2"
      VOICE_PROVIDER: ${{ secrets.VOICE_PROVIDER || 'edge' }}
      EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE || 'pt-BR-ThalitaMultilingualNeural' }}
      EDGE_TTS_RATE: ${{ secrets.EDGE_TTS_RATE || '+5%' }}
      EDGE_TTS_PITCH: ${{ secrets.EDGE_TTS_PITCH || '+0Hz' }}
      EDGE_TTS_VOLUME: ${{ secrets.EDGE_TTS_VOLUME || '+0%' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_MODEL: ${{ secrets.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}
      ELEVENLABS_STABILITY: ${{ secrets.ELEVENLABS_STABILITY || '0.38' }}
      ELEVENLABS_SIMILARITY: ${{ secrets.ELEVENLABS_SIMILARITY || '0.82' }}
      ELEVENLABS_STYLE: ${{ secrets.ELEVENLABS_STYLE || '0.42' }}
      ELEVENLABS_SPEAKER_BOOST: ${{ secrets.ELEVENLABS_SPEAKER_BOOST || 'true' }}
      OPENAI_ENABLED: ${{ secrets.OPENAI_ENABLED || 'false' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
      OPENTRIVIA_ENABLED: ${{ secrets.OPENTRIVIA_ENABLED || 'true' }}
      TIKTOK_UPLOAD_ENABLED: ${{ secrets.TIKTOK_UPLOAD_ENABLED || 'false' }}
      TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
      TIKTOK_STORAGE_STATE: data/tiktok_state.json
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore TikTok session
        env:
          TIKTOK_STORAGE_STATE_B64: ${{ secrets.TIKTOK_STORAGE_STATE_B64 }}
        run: |
          if [ -n "$TIKTOK_STORAGE_STATE_B64" ]; then
            mkdir -p data
            python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ["TIKTOK_STORAGE_STATE_B64"].strip().strip('"').strip("'")
          try:
              decoded = base64.b64decode(raw, validate=True)
          except Exception as exc:
              raise SystemExit(f"TIKTOK_STORAGE_STATE_B64 invalido: {exc}") from exc

          target = Path("data/tiktok_state.json")
          target.write_bytes(decoded)
          print(f"Sessao TikTok restaurada: {target} ({target.stat().st_size} bytes)")
          PY
          else
            echo "No TikTok session configured. Continuing in dry-run/no-upload mode."
          fi

      - name: Validate TikTok upload config
        run: |
          echo "DRY_RUN=$DRY_RUN"
          echo "TIKTOK_UPLOAD_ENABLED=$TIKTOK_UPLOAD_ENABLED"
          if [ -s data/tiktok_state.json ]; then
            echo "TikTok session file found: $(wc -c < data/tiktok_state.json) bytes"
          else
            echo "TikTok session file not found or empty."
          fi
          if [ "$TIKTOK_UPLOAD_ENABLED" = "true" ] && [ "$DRY_RUN" = "false" ] && [ ! -s data/tiktok_state.json ]; then
            echo "TIKTOK_UPLOAD_ENABLED=true, mas TIKTOK_STORAGE_STATE_B64 nao foi configurado."
            echo "Rode scripts/setup_tiktok_session.py localmente e salve o secret TIKTOK_STORAGE_STATE_B64."
            exit 1
          fi

      - name: Generate and optionally publish videos
        run: python main.py --videos 2

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-quiz-artifacts
          path: |
            output/
            logs/
            data/analytics.jsonl
          if-no-files-found: ignore
