name: TikTok Quiz Automation
on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
jobs:
  generate-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ISSO É MUITO IMPORTANTE: Dá permissão para o robô salvar o histórico
    env:
      DRY_RUN: "true"
      VIDEOS_PER_RUN: "6"
      VOICE_PROVIDER: ${{ secrets.VOICE_PROVIDER || 'edge' }}
      EDGE_TTS_VOICE: ${{ secrets.EDGE_TTS_VOICE || 'pt-BR-ThalitaMultilingualNeural' }}
      EDGE_TTS_RATE: ${{ secrets.EDGE_TTS_RATE || '+5%' }}
      EDGE_TTS_PITCH: ${{ secrets.EDGE_TTS_PITCH || '+0Hz' }}
      EDGE_TTS_VOLUME: ${{ secrets.EDGE_TTS_VOLUME || '+0%' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_MODEL: ${{ secrets.ELEVENLABS_MODEL || 'eleven_multilingual_v2' }}
      ELEVENLABS_STABILITY: ${{ secrets.ELEVENLABS_STABILITY || '0.38' }}
      ELEVENLABS_SIMILARITY: ${{ secrets.ELEVENLABS_SIMILARITY || '0.82' }}
      ELEVENLABS_STYLE: ${{ secrets.ELEVENLABS_STYLE || '0.42' }}
      ELEVENLABS_SPEAKER_BOOST: ${{ secrets.ELEVENLABS_SPEAKER_BOOST || 'true' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
      OPENTRIVIA_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Baixa todo o histórico para comparar melhor
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Generate 6 videos
        run: python main.py --videos 6 --no-upload

      - name: Persist to Repo (Backup)
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git pull --rebase origin main || true
          git add -f data/question_history.json
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed, but cache is saved"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-quiz-artifacts
          path: |
            output/
            logs/
            data/analytics.jsonl
            data/question_history.json
          if-no-files-found: ignore
