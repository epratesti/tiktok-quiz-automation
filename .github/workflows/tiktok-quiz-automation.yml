name: TikTok Quiz Automation
on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
jobs:
  generate-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ISSO É MUITO IMPORTANTE: Dá permissão para o robô salvar o histórico
    env:
      DRY_RUN: "true"
      VIDEOS_PER_RUN: "6"
      OPENAI_ENABLED: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Baixa todo o histórico para comparar melhor
      
      - name: Restore History Cache
        uses: actions/cache@v4
        with:
          path: data/
          key: quiz-history-${{ github.run_id }}
          restore-keys: |
            quiz-history-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Generate 6 videos
        run: python main.py --videos 6 --no-upload

      - name: Save History to Cache
        uses: actions/cache/save@v4
        with:
          path: data/
          key: quiz-history-${{ github.run_id }}

      - name: Persist to Repo (Backup)
        if: always()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f data/
          git commit -m "Update history [skip ci]" || echo "No changes"
          git push origin main || echo "Push failed, but cache is saved"
